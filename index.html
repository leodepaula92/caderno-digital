<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Caderno Digital Cloud</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-container">
        <h2>📓 Meu Caderno Cloud</h2>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="password" placeholder="Senha">
        <button class="btn-blue" id="btn-auth">Entrar</button>
        <p style="margin-top:15px; font-size:14px; color:#666">Novo por aqui? <a href="#" id="btn-switch">Criar conta</a></p>
    </div>

    <div id="app-container">
        <div class="header-app">
            <div>
                <h1 style="margin:0">📓 Meu Caderno Digital</h1>
                <small id="user-display" style="color:#666"></small>
            </div>
            <button class="btn-sair" id="btn-sair">Sair</button>
        </div>

        <div class="layout-grid">
            <aside class="sidebar">
                <button class="filter-btn active" id="btnTudo">Exibir Tudo</button>
                <h3>Matérias</h3>
                <div id="filtroMaterias" class="filter-group"></div>
                <h3>Tags</h3>
                <div id="filtroTags" class="filter-group"></div>
            </aside>

            <main class="main-content">
                <div class="card">
                    <input type="hidden" id="edit-id">
                    <input type="text" id="assunto" placeholder="Assunto da Aula">
                    <div class="form-row">
                        <input type="text" id="materia" placeholder="Matéria">
                        <input type="text" id="tags" placeholder="Tags (ex: TI, GITHUB)">
                    </div>
                    <textarea id="conteudo" rows="5" placeholder="Resumo da aula..."></textarea>
                    <button class="btn-blue" id="btnSalvar">Salvar no Caderno</button>
                    <button id="btnCancelar" style="display:none; width:100%; margin-top:10px; background:none; border:none; color:#666; cursor:pointer;">Cancelar Edição</button>
                </div>
                <div id="listaNotas"></div>
            </main>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
