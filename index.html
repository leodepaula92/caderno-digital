<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caderno Pro - Filtros Dinâmicos</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #e9ecef; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .layout-container { display: flex; gap: 20px; width: 100%; max-width: 1000px; align-items: flex-start; }
        
        /* Menu Lateral de Filtros */
        .sidebar { width: 250px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); position: sticky; top: 20px; }
        .sidebar h3 { font-size: 16px; margin-bottom: 10px; border-bottom: 2px solid #3498db; padding-bottom: 5px; }
        .filter-group { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 20px; }
        .filter-btn { background: #f1f2f6; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; transition: 0.3s; }
        .filter-btn:hover, .filter-btn.active { background: #3498db; color: white; }

        /* Area Principal */
        .main-content { flex: 1; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input, textarea { padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; }
        
        .btn-salvar { width: 100%; background-color: #3498db; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-cancelar { width: 100%; background: #95a5a6; color: white; border: none; padding: 8px; border-radius: 8px; margin-top: 5px; display: none; cursor: pointer; }

        .note-item { background: white; padding: 20px; border-radius: 10px; margin-bottom: 15px; border-left: 6px solid #3498db; position: relative; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; margin-right: 5px; }
        .badge-materia { background: #e1f5fe; color: #0288d1; }
        .badge-flag { background: #fff3e0; color: #ef6c00; }
        
        .actions { position: absolute; top: 10px; right: 10px; }
        .btn-edit { background: #f1c40f; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
        .btn-excluir { background: #ff7675; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>📓 Meu Caderno Digital</h1>

    <div class="layout-container">
        <div class="sidebar">
            <button class="filter-btn active" onclick="filtrar('todas')" style="width:100%; margin-bottom:15px;">Exibir Tudo</button>
            
            <h3>Materias</h3>
            <div id="filtroMaterias" class="filter-group"></div>
            
            <h3>Flags</h3>
            <div id="filtroFlags" class="filter-group"></div>
        </div>

        <div class="main-content">
            <div class="card">
                <input type="hidden" id="edit-id">
                <div class="form-group">
                    <label>Assunto da Aula:</label>
                    <input type="text" id="assunto" placeholder="Ex: Introdução ao Firebase">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Materia:</label>
                        <input type="text" id="materia" placeholder="Ex: Banco de Dados">
                    </div>
                    <div class="form-group">
                        <label>Flag:</label>
                        <input type="text" id="flag" placeholder="Ex: Urgente">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Data:</label>
                        <input type="date" id="data">
                    </div>
                </div>

                <div class="form-group">
                    <label>Conteúdo:</label>
                    <textarea id="conteudo" rows="4"></textarea>
                </div>
                
                <button class="btn-salvar" id="btnSalvar">Salvar no Caderno</button>
                <button class="btn-cancelar" id="btnCancelar" onclick="cancelarEdicao()">Cancelar</button>
            </div>

            <div id="listaNotas"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAcQ-eIuJLxLCelWXb40BBWSo6OlndAWoY",
            authDomain: "meu-caderno-digital.firebaseapp.com",
            databaseURL: "https://meu-caderno-digital-default-rtdb.firebaseio.com",
            projectId: "meu-caderno-digital",
            storageBucket: "meu-caderno-digital.firebasestorage.app",
            messagingSenderId: "300654804825",
            appId: "1:300654804825:web:4272fc4c67be0b485d1648"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const notasRef = ref(db, 'notas');

        let todasNotas = {};
        document.getElementById('data').valueAsDate = new Date();

        // SALVAR
        document.getElementById('btnSalvar').onclick = () => {
            const id = document.getElementById('edit-id').value;
            const dados = {
                assunto: document.getElementById('assunto').value,
                materia: document.getElementById('materia').value.trim() || "Sem Materia",
                flag: document.getElementById('flag').value.trim() || "Sem Flag",
                data: document.getElementById('data').value,
                conteudo: document.getElementById('conteudo').value
            };

            if (id) {
                update(ref(db, `notas/${id}`), dados).then(() => cancelarEdicao());
            } else {
                push(notasRef, dados);
                limparForm();
            }
        };

        // LER E ATUALIZAR FILTROS AUTOMATICAMENTE
        onValue(notasRef, (snapshot) => {
            todasNotas = snapshot.val() || {};
            renderizar(todasNotas);
            atualizarFiltrosLaterais(todasNotas);
        });

        function renderizar(notas, filtroMateria = null, filtroFlag = null) {
            const lista = document.getElementById('listaNotas');
            lista.innerHTML = "";
            
            Object.keys(notas).reverse().forEach(id => {
                const n = notas[id];
                
                // Lógica de Filtro
                if (filtroMateria && n.materia !== filtroMateria) return;
                if (filtroFlag && n.flag !== filtroFlag) return;

                lista.innerHTML += `
                    <div class="note-item">
                        <div class="actions">
                            <button class="btn-edit" onclick="prepararEdicao('${id}')">✏️</button>
                            <button class="btn-excluir" onclick="apagar('${id}')">🗑️</button>
                        </div>
                        <span class="badge badge-materia">${n.materia}</span>
                        <span class="badge badge-flag">${n.flag}</span>
                        <br><small>${n.data}</small>
                        <h3>${n.assunto}</h3>
                        <p>${n.conteudo}</p>
                    </div>`;
            });
        }

        function atualizarFiltrosLaterais(notas) {
            const materias = new Set();
            const flags = new Set();

            Object.values(notas).forEach(n => {
                if(n.materia) materias.add(n.materia);
                if(n.flag) flags.add(n.flag);
            });

            const divM = document.getElementById('filtroMaterias');
            const divF = document.getElementById('filtroFlags');

            divM.innerHTML = Array.from(materias).map(m => `<button class="filter-btn" onclick="filtrar('materia', '${m}')">${m}</button>`).join('');
            divF.innerHTML = Array.from(flags).map(f => `<button class="filter-btn" onclick="filtrar('flag', '${f}')">${f}</button>`).join('');
        }

        window.filtrar = (tipo, valor) => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            if(tipo === 'todas') renderizar(todasNotas);
            else if(tipo === 'materia') renderizar(todasNotas, valor, null);
            else if(tipo === 'flag') renderizar(todasNotas, null, valor);
        };

        window.prepararEdicao = (id) => {
            const n = todasNotas[id];
            document.getElementById('edit-id').value = id;
            document.getElementById('assunto').value = n.assunto;
            document.getElementById('materia').value = n.materia;
            document.getElementById('flag').value = n.flag;
            document.getElementById('data').value = n.data;
            document.getElementById('conteudo').value = n.conteudo;
            document.getElementById('btnSalvar').innerText = "Atualizar Nota";
            document.getElementById('btnCancelar').style.display = "block";
            window.scrollTo(0,0);
        };

        window.cancelarEdicao = () => {
            document.getElementById('edit-id').value = "";
            limparForm();
            document.getElementById('btnSalvar').innerText = "Salvar no Caderno";
            document.getElementById('btnCancelar').style.display = "none";
        };

        function limparForm() {
            document.getElementById('assunto').value = "";
            document.getElementById('materia').value = "";
            document.getElementById('flag').value = "";
            document.getElementById('conteudo').value = "";
            document.getElementById('data').valueAsDate = new Date();
        }

        window.apagar = (id) => { if(confirm("Apagar?")) remove(ref(db, `notas/${id}`)); };
    </script>
</body>
</html>
