<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Caderno Cloud - Multiuser</title>
    <style>
        :root { --blue: #3498db; --bg: #e9ecef; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        /* Telas */
        #auth-container, #app-container { width: 100%; max-width: 400px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-top: 50px; }
        #app-container { max-width: 1000px; display: none; } /* Escondido até logar */
        
        .layout { display: flex; gap: 20px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-blue { background: var(--blue); color: white; margin-top: 10px; }
        .btn-link { background: none; color: var(--blue); text-decoration: underline; margin-top: 10px; }
        
        .header-user { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 1000px; margin-bottom: 20px; }
        .note-item { background: white; padding: 20px; border-radius: 10px; margin-bottom: 15px; border-left: 6px solid var(--blue); position: relative; }
        .badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-right: 5px; background: #eee; }
    </style>
</head>
<body>

    <div id="auth-container">
        <h2 id="auth-title">Login</h2>
        <input type="email" id="email" placeholder="Seu e-mail">
        <input type="password" id="password" placeholder="Sua senha">
        <button class="btn-blue" id="btn-auth">Entrar</button>
        <button class="btn-link" id="btn-switch">Criar uma conta</button>
    </div>

    <div id="app-container">
        <div class="header-user">
            <span id="user-email"></span>
            <button onclick="logout()" style="width: auto; padding: 5px 15px; background: #ff7675; color: white;">Sair</button>
        </div>

        <div class="layout">
            <div style="flex: 1;">
                <div style="background: #f9f9f9; padding: 20px; border-radius: 10px;">
                    <input type="hidden" id="edit-id">
                    <input type="text" id="assunto" placeholder="Assunto da Aula">
                    <input type="text" id="flag" placeholder="Tags (separadas por vírgula)">
                    <textarea id="conteudo" rows="4" placeholder="Conteúdo..."></textarea>
                    <button class="btn-blue" id="btnSalvar">Salvar Nota</button>
                </div>
            </div>
            <div id="listaNotas" style="flex: 1.5;"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAcQ-eIuJLxLCelWXb40BBWSo6OlndAWoY",
            authDomain: "meu-caderno-digital.firebaseapp.com",
            databaseURL: "https://meu-caderno-digital-default-rtdb.firebaseio.com",
            projectId: "meu-caderno-digital",
            storageBucket: "meu-caderno-digital.firebasestorage.app",
            messagingSenderId: "300654804825",
            appId: "1:300654804825:web:4272fc4c67be0b485d1648"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        let userLogado = null;

        // --- LÓGICA DE AUTH ---
        const btnAuth = document.getElementById('btn-auth');
        const btnSwitch = document.getElementById('btn-switch');
        let isLogin = true;

        btnSwitch.onclick = () => {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? "Login" : "Cadastro";
            btnAuth.innerText = isLogin ? "Entrar" : "Cadastrar";
            btnSwitch.innerText = isLogin ? "Criar uma conta" : "Já tenho conta";
        };

        btnAuth.onclick = () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if(isLogin) {
                signInWithEmailAndPassword(auth, email, pass).catch(e => alert("Erro: " + e.message));
            } else {
                createUserWithEmailAndPassword(auth, email, pass).catch(e => alert("Erro: " + e.message));
            }
        };

        window.logout = () => signOut(auth);

        // MONITOR DE USUÁRIO (Saber se está logado ou não)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                userLogado = user;
                document.getElementById('auth-container').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
                document.getElementById('user-email').innerText = "Logado como: " + user.email;
                carregarNotas(user.uid);
            } else {
                userLogado = null;
                document.getElementById('auth-container').style.display = 'block';
                document.getElementById('app-container').style.display = 'none';
            }
        });

        // --- LÓGICA DO CADERNO ---
        function carregarNotas(uid) {
            const notasUserRef = ref(db, `usuarios/${uid}/notas`);
            onValue(notasUserRef, (snapshot) => {
                const lista = document.getElementById('listaNotas');
                lista.innerHTML = "";
                const notas = snapshot.val();
                if(notas) {
                    Object.keys(notas).reverse().forEach(id => {
                        const n = notas[id];
                        lista.innerHTML += `
                            <div class="note-item">
                                <h3>${n.assunto}</h3>
                                <p>${n.conteudo}</p>
                                <button onclick="apagarNota('${id}')" style="background:red; color:white; border:none; padding:5px; border-radius:4px; cursor:pointer;">Apagar</button>
                            </div>`;
                    });
                }
            });
        }

        document.getElementById('btnSalvar').onclick = () => {
            if(!userLogado) return;
            const notasUserRef = ref(db, `usuarios/${userLogado.uid}/notas`);
            push(notasUserRef, {
                assunto: document.getElementById('assunto').value,
                conteudo: document.getElementById('conteudo').value,
                flag: document.getElementById('flag').value
            });
            document.getElementById('assunto').value = "";
            document.getElementById('conteudo').value = "";
        };

        window.apagarNota = (id) => {
            remove(ref(db, `usuarios/${userLogado.uid}/notas/${id}`));
        };
    </script>
</body>
</html>
