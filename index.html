<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Caderno Digital Pro</title>
    <style>
        :root { --blue: #3498db; --bg: #e9ecef; --dark: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        /* TELA DE LOGIN */
        #auth-container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; margin-top: 100px; text-align: center; }
        
        /* LAYOUT PRINCIPAL */
        #app-container { display: none; width: 100%; max-width: 1100px; }
        .header-app { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 30px; }
        .layout-grid { display: flex; gap: 30px; align-items: flex-start; }

        /* SIDEBAR FILTROS */
        .sidebar { width: 250px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); position: sticky; top: 20px; }
        .sidebar h3 { font-size: 14px; margin: 15px 0 10px 0; border-bottom: 2px solid var(--blue); padding-bottom: 5px; color: var(--dark); text-transform: uppercase; }
        .filter-group { display: flex; flex-wrap: wrap; gap: 6px; }

        /* CARD DE CADASTRO */
        .main-content { flex: 1; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        .btn-blue { background: var(--blue); color: white; border: none; padding: 15px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        
        .filter-btn { background: #f1f2f6; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .filter-btn:hover { background: #ddd; }
        .filter-btn.active { background: var(--blue); color: white; }

        /* ESTILO DAS NOTAS */
        .note-item { background: white; padding: 25px; border-radius: 12px; margin-bottom: 20px; border-left: 6px solid var(--blue); position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-right: 8px; margin-bottom: 10px; text-transform: uppercase; }
        .badge-materia { background: #e1f5fe; color: #0288d1; }
        .badge-tag { background: #fff3e0; color: #ef6c00; }
        
        .actions { position: absolute; top: 15px; right: 15px; }
        .btn-action { border: none; padding: 6px 10px; border-radius: 5px; cursor: pointer; color: white; font-size: 12px; margin-left: 5px; }
        .btn-sair { background: #ff7675; padding: 8px 20px; border-radius: 8px; color: white; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-container">
        <h2 id="auth-title">📓 Meu Caderno Cloud</h2>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="password" placeholder="Senha">
        <button class="btn-blue" id="btn-auth">Entrar</button>
        <p style="margin-top:15px; font-size:14px; color:#666">Novo por aqui? <a href="#" id="btn-switch">Criar conta</a></p>
    </div>

    <div id="app-container">
        <div class="header-app">
            <div>
                <h1 style="margin:0">📓 Meu Caderno Digital</h1>
                <small id="user-display" style="color:#666"></small>
            </div>
            <button class="btn-sair" onclick="logout()">Sair</button>
        </div>

        <div class="layout-grid">
            <div class="sidebar">
                <button class="filter-btn active" id="btnTudo" onclick="filtrar('todas')" style="width:100%; margin-bottom:15px; font-weight:bold">Exibir Tudo</button>
                
                <h3>Matérias</h3>
                <div id="filtroMaterias" class="filter-group"></div>

                <h3>Tags</h3>
                <div id="filtroTags" class="filter-group"></div>
            </div>

            <div class="main-content">
                <div class="card">
                    <input type="hidden" id="edit-id">
                    
                    <label><b>Assunto da Aula:</b></label>
                    <input type="text" id="assunto" placeholder="Ex: Aula de Flexbox">
                    
                    <div class="form-row">
                        <div style="display:flex; flex-direction:column">
                            <label><b>Matéria:</b></label>
                            <input type="text" id="materia" placeholder="Ex: Programação">
                        </div>
                        <div style="display:flex; flex-direction:column">
                            <label><b>Tags:</b></label>
                            <input type="text" id="tags" placeholder="Ex: TI, GITHUB">
                        </div>
                    </div>
                    
                    <label><b>Conteúdo:</b></label>
                    <textarea id="conteudo" rows="5" placeholder="Resumo da aula..."></textarea>
                    
                    <button class="btn-blue" id="btnSalvar">Salvar no Caderno</button>
                    <button id="btnCancelar" onclick="cancelarEdicao()" style="display:none; width:100%; margin-top:10px; background:none; border:none; color:#666; cursor:pointer; text-decoration:underline">Cancelar Edição</button>
                </div>

                <div id="listaNotas"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAcQ-eIuJLxLCelWXb40BBWSo6OlndAWoY",
            authDomain: "meu-caderno-digital.firebaseapp.com",
            databaseURL: "https://meu-caderno-digital-default-rtdb.firebaseio.com",
            projectId: "meu-caderno-digital",
            storageBucket: "meu-caderno-digital.firebasestorage.app",
            messagingSenderId: "300654804825",
            appId: "1:300654804825:web:4272fc4c67be0b485d1648"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        let userLogado = null;
        let todasNotas = {};

        // --- AUTH ---
        const btnAuth = document.getElementById('btn-auth');
        const btnSwitch = document.getElementById('btn-switch');
        let isLogin = true;

        btnSwitch.onclick = (e) => {
            e.preventDefault();
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? "Login" : "Cadastro";
            btnAuth.innerText = isLogin ? "Entrar" : "Cadastrar";
            btnSwitch.innerText = isLogin ? "Criar conta" : "Já tenho conta";
        };

        btnAuth.onclick = () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if(isLogin) signInWithEmailAndPassword(auth, email, pass).catch(e => alert("Erro: " + e.message));
            else createUserWithEmailAndPassword(auth, email, pass).catch(e => alert("Erro: " + e.message));
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                userLogado = user;
                document.getElementById('auth-container').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
                document.getElementById('user-display').innerText = "Logado como: " + user.email;
                iniciarApp(user.uid);
            } else {
                document.getElementById('auth-container').style.display = 'block';
                document.getElementById('app-container').style.display = 'none';
            }
        });

        // --- CADERNO ---
        function iniciarApp(uid) {
            const notasRef = ref(db, `usuarios/${uid}/notas`);
            onValue(notasRef, (snapshot) => {
                todasNotas = snapshot.val() || {};
                renderizar(todasNotas);
                atualizarFiltros(todasNotas);
            });
        }

        document.getElementById('btnSalvar').onclick = () => {
            const id = document.getElementById('edit-id').value;
            const dados = {
                assunto: document.getElementById('assunto').value,
                materia: document.getElementById('materia').value,
                tags: document.getElementById('tags').value,
                conteudo: document.getElementById('conteudo').value,
                data: new Date().toLocaleDateString('pt-BR')
            };

            if (id) update(ref(db, `usuarios/${userLogado.uid}/notas/${id}`), dados).then(() => cancelarEdicao());
            else push(ref(db, `usuarios/${userLogado.uid}/notas`), dados);
            limparCampos();
        };

        function renderizar(notas, tipoFiltro = null, valorFiltro = null) {
            const lista = document.getElementById('listaNotas');
            lista.innerHTML = "";
            Object.keys(notas).reverse().forEach(id => {
                const n = notas[id];
                const arrayMaterias = n.materia ? n.materia.split(',').map(s => s.trim()) : [];
                const arrayTags = n.tags ? n.tags.split(',').map(s => s.trim()) : [];

                if(tipoFiltro === 'materia' && !arrayMaterias.includes(valorFiltro)) return;
                if(tipoFiltro === 'tag' && !arrayTags.includes(valorFiltro)) return;

                const matsHtml = arrayMaterias.map(m => `<span class="badge badge-materia">${m}</span>`).join('');
                const tagsHtml = arrayTags.map(t => `<span class="badge badge-tag">${t}</span>`).join('');
                
                lista.innerHTML += `
                    <div class="note-item">
                        <div class="actions">
                            <button class="btn-action" style="background:#f1c40f" onclick="window.prepararEdicao('${id}')">✏️</button>
                            <button class="btn-action" style="background:#ff7675" onclick="window.apagar('${id}')">🗑️</button>
                        </div>
                        <div>${matsHtml} ${tagsHtml}</div>
                        <small>${n.data}</small>
                        <h3 style="margin:10px 0">${n.assunto}</h3>
                        <p style="white-space: pre-wrap;">${n.conteudo}</p>
                    </div>`;
            });
        }

        function atualizarFiltros(notas) {
            const materias = new Set();
            const tags = new Set();
            Object.values(notas).forEach(n => {
                if(n.materia) n.materia.split(',').forEach(m => materias.add(m.trim()));
                if(n.tags) n.tags.split(',').forEach(t => tags.add(t.trim()));
            });
            document.getElementById('filtroMaterias').innerHTML = Array.from(materias).sort().map(m => `<button class="filter-btn" onclick="filtrar('materia', '${m}')">${m}</button>`).join('');
            document.getElementById('filtroTags').innerHTML = Array.from(tags).sort().map(t => `<button class="filter-btn" onclick="filtrar('tag', '${t}')">${t}</button>`).join('');
        }

        window.filtrar = (tipo, valor) => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            if(tipo === 'todas') renderizar(todasNotas);
            else renderizar(todasNotas, tipo, valor);
        };

        window.prepararEdicao = (id) => {
            const n = todasNotas[id];
            document.getElementById('edit-id').value = id;
            document.getElementById('assunto').value = n.assunto;
            document.getElementById('materia').value = n.materia || "";
            document.getElementById('tags').value = n.tags || "";
            document.getElementById('conteudo').value = n.conteudo;
            document.getElementById('btnSalvar').innerText = "Atualizar Nota";
            document.getElementById('btnCancelar').style.display = "block";
            window.scrollTo(0,0);
        };

        window.cancelarEdicao = () => {
            document.getElementById('edit-id').value = "";
            limparCampos();
            document.getElementById('btnSalvar').innerText = "Salvar no Caderno";
            document.getElementById('btnCancelar').style.display = "none";
        };

        function limparCampos() {
            document.getElementById('assunto').value = "";
            document.getElementById('materia').value = "";
            document.getElementById('tags').value = "";
            document.getElementById('conteudo').value = "";
        }

        window.apagar = (id) => { if(confirm("Apagar nota?")) remove(ref(db, `usuarios/${userLogado.uid}/notas/${id}`)); };
    </script>
</body>
</html>
