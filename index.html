<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Caderno Digital Cloud</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-container">
        <h2>📓 Login / Cadastro</h2>
        <input type="email" id="email" placeholder="Seu e-mail">
        <input type="password" id="password" placeholder="Sua senha">
        <button class="btn-blue" id="btn-auth">Entrar</button>
        <p><a href="#" id="btn-switch" style="color: #3498db; text-decoration: none; font-size: 14px;">Criar uma conta</a></p>
    </div>

    <div id="app-container">
        <header class="header-app">
            <div>
                <h1 style="margin:0">📓 Meu Caderno Digital</h1>
                <small id="user-display"></small>
            </div>
            <button class="btn-sair" id="btn-sair">Sair</button>
        </header>

        <div class="layout-grid">
            <aside class="sidebar">
                <button class="filter-btn active" id="btnTudo" onclick="window.filtrar('todas', '', this)">Exibir Tudo</button>
                <h3>Matérias</h3>
                <div id="filtroMaterias" class="filter-group"></div>
                <h3>Tags</h3>
                <div id="filtroTags" class="filter-group"></div>
            </aside>

            <main class="main-content">
                <div class="card">
                    <input type="hidden" id="edit-id">
                    <div class="form-group">
                        <label><b>Assunto da Aula:</b></label>
                        <input type="text" id="assunto" placeholder="Ex: Aula 01">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label><b>Matéria:</b></label>
                            <input type="text" id="materia" placeholder="Ex: TI">
                        </div>
                        <div class="form-group">
                            <label><b>Tags:</b></label>
                            <input type="text" id="tags" placeholder="Ex: GITHUB, SQL">
                        </div>
                    </div>
                    <div class="form-group">
                        <label><b>Conteúdo:</b></label>
                        <textarea id="conteudo" rows="5" placeholder="Resumo da aula..."></textarea>
                    </div>
                    <button class="btn-blue" id="btnSalvar">Salvar no Caderno</button>
                    <button id="btnCancelar" style="display:none; width:100%; border:none; background:none; color:gray; cursor:pointer; margin-top:10px; text-decoration:underline">Cancelar Edição</button>
                </div>
                <div id="listaNotas"></div>
            </main>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
