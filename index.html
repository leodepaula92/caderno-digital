<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caderno Cloud Leo</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #e9ecef; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .header { text-align: center; margin-bottom: 20px; }
        .card { background: white; width: 100%; max-width: 600px; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); box-sizing: border-box; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; color: #333; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        
        .btn-salvar { width: 100%; background-color: #3498db; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-salvar:hover { background-color: #2980b9; }
        .btn-cancelar { width: 100%; background-color: #95a5a6; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; margin-top: 5px; display: none; }

        .notes-container { width: 100%; max-width: 600px; margin-top: 30px; }
        .note-item { background: white; padding: 20px; border-radius: 10px; margin-bottom: 15px; border-left: 6px solid #3498db; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        .actions { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; }
        .btn-edit { background: #f1c40f; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .btn-excluir { background: #ff7675; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>📓 Meu caderno digital</h1>
        <p>Organize-se (Sincronizado na Nuvem)</p>
    </div>

    <div class="card">
        <input type="hidden" id="edit-id"> <div class="form-group">
            <label>Assunto:</label>
            <input type="text" id="assunto" placeholder="Ex: Aula de Firebase">
        </div>
        <div class="form-group">
            <label>Data:</label>
            <input type="date" id="data">
        </div>
        <div class="form-group">
            <label>Conteúdo:</label>
            <textarea id="conteudo" rows="5" placeholder="Escreva aqui..."></textarea>
        </div>
        <button class="btn-salvar" id="btnSalvar">Salvar no Caderno</button>
        <button class="btn-cancelar" id="btnCancelar" onclick="cancelarEdicao()">Cancelar Edição</button>
    </div>

    <div id="listaNotas" class="notes-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAcQ-eIuJLxLCelWXb40BBWSo6OlndAWoY",
            authDomain: "meu-caderno-digital.firebaseapp.com",
            databaseURL: "https://meu-caderno-digital-default-rtdb.firebaseio.com",
            projectId: "meu-caderno-digital",
            storageBucket: "meu-caderno-digital.firebasestorage.app",
            messagingSenderId: "300654804825",
            appId: "1:300654804825:web:4272fc4c67be0b485d1648"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const notasRef = ref(db, 'notas');

        document.getElementById('data').valueAsDate = new Date();

        // SALVAR OU ATUALIZAR
        document.getElementById('btnSalvar').onclick = () => {
            const id = document.getElementById('edit-id').value;
            const assunto = document.getElementById('assunto').value;
            const data = document.getElementById('data').value;
            const conteudo = document.getElementById('conteudo').value;

            if (!assunto || !conteudo) return alert("Preencha tudo!");

            if (id) {
                // Se tem ID, estamos editando
                update(ref(db, `notas/${id}`), { assunto, data, conteudo })
                .then(() => cancelarEdicao());
            } else {
                // Se não tem ID, é nota nova
                push(notasRef, { assunto, data, conteudo });
                limparCampos();
            }
        };

        // LER NOTAS
        onValue(notasRef, (snapshot) => {
            const lista = document.getElementById('listaNotas');
            lista.innerHTML = "";
            const notas = snapshot.val();
            if (notas) {
                Object.keys(notas).reverse().forEach(id => {
                    const n = notas[id];
                    lista.innerHTML += `
                        <div class="note-item">
                            <div class="actions">
                                <button class="btn-edit" onclick="prepararEdicao('${id}', '${n.assunto}', '${n.data}', \`${n.conteudo.replace(/`/g, '\\`')}\`)">Editar</button>
                                <button class="btn-excluir" onclick="window.apagar('${id}')">Excluir</button>
                            </div>
                            <small>${n.data}</small>
                            <h3>${n.assunto}</h3>
                            <p>${n.conteudo}</p>
                        </div>`;
                });
            }
        });

        // FUNÇÃO PARA SUBIR DADOS PARA O FORM
        window.prepararEdicao = (id, assunto, data, conteudo) => {
            document.getElementById('edit-id').value = id;
            document.getElementById('assunto').value = assunto;
            document.getElementById('data').value = data;
            document.getElementById('conteudo').value = conteudo;
            
            document.getElementById('btnSalvar').innerText = "Atualizar Nota";
            document.getElementById('btnSalvar').style.backgroundColor = "#27ae60";
            document.getElementById('btnCancelar').style.display = "block";
            window.scrollTo(0,0);
        };

        window.cancelarEdicao = () => {
            document.getElementById('edit-id').value = "";
            limparCampos();
            document.getElementById('btnSalvar').innerText = "Salvar no Caderno";
            document.getElementById('btnSalvar').style.backgroundColor = "#3498db";
            document.getElementById('btnCancelar').style.display = "none";
        };

        function limparCampos() {
            document.getElementById('assunto').value = "";
            document.getElementById('conteudo').value = "";
            document.getElementById('data').valueAsDate = new Date();
        }

        window.apagar = (id) => {
            if(confirm("Excluir nota?")) remove(ref(db, `notas/${id}`));
        };
    </script>
</body>
</html>
