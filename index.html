<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Caderno Digital ☁️</title>
    <style>
        :root {
            --bg-color: #e9ecef;
            --card-bg: #ffffff;
            --primary-blue: #3498db;
            --text-dark: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--text-dark); margin-bottom: 5px; }

        .card {
            background: var(--card-bg);
            width: 100%;
            max-width: 700px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #444; }
        
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .btn-salvar {
            width: 100%;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-salvar:hover { background-color: #2980b9; }

        /* Estilo das Notas vindas do Banco */
        .notes-container { width: 100%; max-width: 700px; margin-top: 30px; }
        
        .note-item { 
            background: white; 
            padding: 20px; 
            border-radius: 10px; 
            margin-bottom: 15px; 
            border-left: 6px solid var(--primary-blue);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            position: relative;
        }

        .note-item h3 { margin: 10px 0; color: var(--text-dark); }
        .note-item p { white-space: pre-wrap; color: #555; }
        .note-item small { color: #888; }

        .btn-excluir {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ff7675;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>📓 Meu caderno digital</h1>
        <p>Organize-se (Sincronizado na Nuvem)</p>
    </div>
